<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Gracia Pharmindo">
  <defs>
    <linearGradient id="gracia-bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#gracia-bg)"/>
  <!-- pharma plus mark -->
  <g fill="#ffffff" opacity="0.9">
    <rect x="33" y="10" width="3.2" height="9" rx="1.6"/>
    <rect x="30.1" y="12.9" width="9" height="3.2" rx="1.6"/>
  </g>
  <!-- G monogram -->
  <text x="24" y="34.5" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="27" font-weight="800" text-anchor="middle" fill="#ffffff">G</text>
</svg>
